<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadeNotes</title>
<style>
:root{
--bg:#f5f6f8;
--panel:#ffffff;
--text:#1d1d1f;
--muted:#6f6f74;
--border:#e5e5ea;
--accent:#e53935;
--fresh:#ffffff;
--aging:#fff2d9;
--fading:#ffe2e2;
}
body.dark{
--bg:#0f0f11;
--panel:#1a1a1d;
--text:#f3f3f4;
--muted:#9a9aa1;
--border:#2b2b31;
--fresh:#1a1a1d;
--aging:#2a261c;
--fading:#2c1d1d;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui, sans-serif;
background:var(--bg);
color:var(--text);
}
.wrap{
max-width:900px;
margin:auto;
padding:20px;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}
h1{margin:0;font-size:28px;}
.theme-toggle{
cursor:pointer;
font-size:22px;
background:none;
border:none;
color:var(--text);
}
.grid{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
}
.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:14px;
padding:16px;
}
textarea{
width:100%;
height:160px;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--panel);
color:var(--text);
}
select,input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--panel);
color:var(--text);
}
.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}
.actions{
display:flex;
gap:10px;
margin-top:12px;
}
button{
padding:10px 14px;
border-radius:10px;
border:none;
cursor:pointer;
}
.primary{
background:#333;
color:white;
}
.flag-button{
width:46px;
font-size:20px;
background:var(--panel);
border:1px solid var(--border);
}
.flag-button.active{
border:2px solid var(--accent);
color:var(--accent);
}
.note-list{
display:grid;
gap:12px;
}
.note{
padding:14px;
border-radius:12px;
border:1px solid var(--border);
background:var(--fresh);
transition:opacity .4s, filter .4s, transform .3s;
}
.note-aging{background:var(--aging)}
.note-fading{background:var(--fading)}
.note.flagged{border:2px solid var(--accent);}
.meta{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:12px;
color:var(--muted);
}
.note-actions{
display:flex;
gap:6px;
margin-top:8px;
}
.note-actions button{
font-size:12px;
padding:6px 8px;
}
@media(max-width:800px){
.grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>FadeNotes</h1>
<button class="theme-toggle" id="themeToggle">🌙</button>
</header>

<div class="grid">
<div class="card">
<textarea id="noteText" placeholder="Write temporary note..."></textarea>

<div class="row">
<select id="preset">
<option value="1">1 hour</option>
<option value="6">6 hours</option>
<option value="12">12 hours</option>
<option value="24" selected>1 day</option>
<option value="72">3 days</option>
<option value="168">7 days</option>
</select>
<input id="customHours" type="number" placeholder="Custom hours">
</div>

<div class="actions">
<button class="primary" id="addBtn">Save</button>
<button class="flag-button" id="importantBtn">⚑</button>
</div>
</div>

<div class="card">
<div id="summary"></div>
<div id="noteList" class="note-list"></div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>

const STORAGE_KEY='fadenotes';
const THEME_KEY='fadenotes-theme';

const noteText=document.getElementById('noteText');
const preset=document.getElementById('preset');
const customHours=document.getElementById('customHours');
const addBtn=document.getElementById('addBtn');
const importantBtn=document.getElementById('importantBtn');
const noteList=document.getElementById('noteList');
const summary=document.getElementById('summary');
const themeToggle=document.getElementById('themeToggle');

function loadNotes(){
return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')
}

function saveNotes(n){
localStorage.setItem(STORAGE_KEY,JSON.stringify(n))
}

function createNote(text,hours,flag){
let now=Date.now()
return{
id:crypto.randomUUID(),
text,
flagged:flag,
createdAt:now,
expiresAt:now+hours*3600000,
order:now
}
}

function removeExpired(n){
let now=Date.now()
return n.filter(x=>x.expiresAt>now)
}

function progress(note){
let total=note.expiresAt-note.createdAt
let left=note.expiresAt-Date.now()
return Math.max(0,Math.min(1,left/total))
}

function opacity(note){
let r=progress(note)
return .15+r*.85
}

function blur(note){
let r=progress(note)
return (1-r)*1
}

function themeClass(note){
let r=progress(note)
if(r>.6)return''
if(r>.25)return'note-aging'
return'note-fading'
}

function render(){

let notes=removeExpired(loadNotes())
saveNotes(notes)

notes.sort((a,b)=>a.order-b.order)

summary.textContent=notes.length+" active notes"

if(!notes.length){
noteList.innerHTML="<div>No notes yet</div>"
return
}

noteList.innerHTML=notes.map(n=>{

let left=n.expiresAt-Date.now()

return`
<div class="note ${themeClass(n)} ${n.flagged?'flagged':''}" data-id="${n.id}"
style="opacity:${opacity(n)};filter:blur(${blur(n)}px)">

<div>${n.text}</div>

<div class="meta">
<span>${Math.floor(left/3600000)}h left</span>
<span>${new Date(n.createdAt).toLocaleString()}</span>
</div>

<div class="note-actions">
<button data-a="flag" data-id="${n.id}">${n.flagged?'Unflag':'Flag'}</button>
<button data-a="extend" data-id="${n.id}">+1d</button>
<button data-a="del" data-id="${n.id}">Delete</button>
</div>

</div>
`
}).join('')
}

function addNote(){

let text=noteText.value.trim()
let hours=Number(preset.value)||Number(customHours.value)

if(!text)return

let notes=loadNotes()

notes.unshift(createNote(text,hours,importantBtn.classList.contains('active')))

saveNotes(notes)

noteText.value=""
importantBtn.classList.remove("active")

render()
}

addBtn.onclick=addNote

importantBtn.onclick=()=>{
importantBtn.classList.toggle("active")
}

noteList.onclick=e=>{

let btn=e.target.closest("button")
if(!btn)return

let id=btn.dataset.id
let action=btn.dataset.a

let notes=loadNotes()

if(action=="del")notes=notes.filter(n=>n.id!==id)

if(action=="extend"){
notes=notes.map(n=>n.id==id?{...n,expiresAt:n.expiresAt+86400000}:n)
}

if(action=="flag"){
notes=notes.map(n=>n.id==id?{...n,flagged:!n.flagged}:n)
}

saveNotes(notes)
render()

}

themeToggle.onclick=()=>{
let next=document.body.classList.contains("dark")?"light":"dark"
localStorage.setItem(THEME_KEY,next)
applyTheme(next)
}

function applyTheme(t){
document.body.classList.toggle("dark",t==="dark")
themeToggle.textContent=t==="dark"?"☀":"🌙"
}

applyTheme(localStorage.getItem(THEME_KEY)||"dark")

new Sortable(noteList,{animation:150})

render()
setInterval(render,30000)

</script>
</body>
</html>
