<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadeNotes</title>
<style>
:root{
  --bg:#f4f6f8;
  --panel:#ffffff;
  --panel-2:#fafafa;
  --text:#1d1d1f;
  --muted:#6f6f74;
  --border:#e4e7ec;
  --accent:#e53935;
  --button:#2f2f33;
  --button-text:#ffffff;
  --fresh:#ffffff;
  --aging:#fff3dc;
  --fading:#ffe4e4;
  --shadow:0 8px 24px rgba(0,0,0,0.08);
  --note-shadow:0 6px 16px rgba(0,0,0,0.10);
}

body.dark{
  --bg:#15171b;
  --panel:#22262d;
  --panel-2:#1b1f25;
  --text:#f2f4f7;
  --muted:#a1a8b3;
  --border:#343a44;
  --accent:#ff4d4f;
  --button:#f2f4f7;
  --button-text:#15171b;
  --fresh:#242931;
  --aging:#332d21;
  --fading:#362426;
  --shadow:0 12px 30px rgba(0,0,0,0.35);
  --note-shadow:0 8px 18px rgba(0,0,0,0.30);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100vh;
}

body{
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:background .2s ease,color .2s ease;
}

.wrap{
  max-width:940px;
  margin:auto;
  padding:20px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:28px;
}

.theme-toggle{
  cursor:pointer;
  font-size:22px;
  background:var(--panel);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:12px;
  width:46px;
  height:46px;
  box-shadow:var(--shadow);
}

.grid{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:20px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  box-shadow:var(--shadow);
}

textarea{
  width:100%;
  min-height:170px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel-2);
  color:var(--text);
  resize:vertical;
  outline:none;
}

select,input{
  width:100%;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel-2);
  color:var(--text);
  outline:none;
}

textarea:focus,select:focus,input:focus{
  border-color:#7b8aa0;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:12px;
}

button{
  padding:10px 14px;
  border-radius:12px;
  border:none;
  cursor:pointer;
}

.primary{
  background:var(--button);
  color:var(--button-text);
  font-weight:600;
}

.flag-button{
  width:46px;
  font-size:20px;
  background:var(--panel-2);
  color:var(--text);
  border:1px solid var(--border);
}

.flag-button.active{
  border:2px solid var(--accent);
  color:var(--accent);
}

.summary{
  margin:0 0 12px;
  color:var(--muted);
}

.note-list{
  display:grid;
  gap:12px;
}

.empty{
  color:var(--muted);
  padding:10px 0;
}

.note{
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--fresh);
  transition:opacity .35s ease, filter .35s ease, transform .25s ease, box-shadow .25s ease;
  box-shadow:var(--note-shadow);
}

.note:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(0,0,0,0.18);
}

.note-aging{background:var(--aging)}
.note-fading{background:var(--fading)}

.note.flagged{
  border:2px solid var(--accent);
  box-shadow:0 0 0 1px rgba(229,57,53,0.18), var(--note-shadow);
}

.note-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}

.note-text{
  margin:0 0 8px;
  white-space:pre-wrap;
  word-break:break-word;
}

.meta{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
  flex-wrap:wrap;
}

.note-actions{
  display:flex;
  gap:6px;
  margin-top:10px;
  flex-wrap:wrap;
}

.note-actions button{
  font-size:12px;
  padding:6px 8px;
  background:var(--panel-2);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
}

.note-handle{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:30px;
  height:30px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--panel-2);
  color:var(--muted);
  cursor:grab;
  user-select:none;
  touch-action:none;
}

@media(max-width:800px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>FadeNotes</h1>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">🌙</button>
  </header>

  <div class="grid">
    <div class="card">
      <textarea id="noteText" placeholder="Write temporary note..."></textarea>

      <div class="row">
        <select id="preset">
          <option value="1">1 hour</option>
          <option value="6">6 hours</option>
          <option value="12">12 hours</option>
          <option value="24" selected>1 day</option>
          <option value="72">3 days</option>
          <option value="168">7 days</option>
          <option value="custom">Custom</option>
        </select>
        <input id="customHours" type="number" min="1" step="1" placeholder="Custom hours" disabled>
      </div>

      <div class="actions">
        <button class="primary" id="addBtn" type="button">Save</button>
        <button class="flag-button" id="importantBtn" type="button" aria-pressed="false">⚑</button>
      </div>
    </div>

    <div class="card">
      <p id="summary" class="summary">0 active notes</p>
      <div id="noteList" class="note-list"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
const STORAGE_KEY='fadenotes';
const THEME_KEY='fadenotes-theme';

const noteText=document.getElementById('noteText');
const preset=document.getElementById('preset');
const customHours=document.getElementById('customHours');
const addBtn=document.getElementById('addBtn');
const importantBtn=document.getElementById('importantBtn');
const noteList=document.getElementById('noteList');
const summary=document.getElementById('summary');
const themeToggle=document.getElementById('themeToggle');

function loadNotes(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  }catch{
    return [];
  }
}

function saveNotes(notes){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(notes));
}

function createNote(text,hours,flagged){
  const now=Date.now();
  return {
    id:crypto.randomUUID(),
    text,
    flagged,
    createdAt:now,
    expiresAt:now + hours*3600000,
    order:now
  };
}

function removeExpired(notes){
  const now=Date.now();
  return notes.filter(note=>note.expiresAt>now);
}

function getHours(){
  if(preset.value==='custom'){
    const v=Number(customHours.value);
    return Number.isFinite(v) && v>0 ? v : null;
  }
  return Number(preset.value);
}

function progress(note){
  const total=Math.max(1,note.expiresAt-note.createdAt);
  const left=note.expiresAt-Date.now();
  return Math.max(0,Math.min(1,left/total));
}

function opacity(note){
  const r=progress(note);
  return 0.15 + r*0.85;
}

function blur(note){
  const r=progress(note);
  return (1-r)*1;
}

function themeClass(note){
  const r=progress(note);
  if(r>0.6) return '';
  if(r>0.25) return 'note-aging';
  return 'note-fading';
}

function formatLeft(ms){
  if(ms<=0) return 'expired';
  const mins=Math.floor(ms/60000);
  const days=Math.floor(mins/(60*24));
  const hours=Math.floor((mins%(60*24))/60);
  const minutes=mins%60;
  if(days>0) return `${days}d ${hours}h left`;
  if(hours>0) return `${hours}h ${minutes}m left`;
  return `${minutes}m left`;
}

function escapeHtml(text){
  return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function render(){
  let notes=removeExpired(loadNotes());
  saveNotes(notes);
  notes.sort((a,b)=>(a.order??0)-(b.order??0));

  summary.textContent = `${notes.length} active note${notes.length===1?'':'s'}`;

  if(!notes.length){
    noteList.innerHTML='<div class="empty">No notes yet</div>';
    return;
  }

  noteList.innerHTML=notes.map(note=>{
    const left=note.expiresAt-Date.now();
    return `
      <div class="note ${themeClass(note)} ${note.flagged?'flagged':''}" data-id="${note.id}"
        style="opacity:${opacity(note)};filter:blur(${blur(note)}px)">
        <div class="note-top">
          <div></div>
          <div class="note-handle" aria-label="Drag to reorder" title="Drag to reorder">☰</div>
        </div>

        <div class="note-text">${escapeHtml(note.text)}</div>

        <div class="meta">
          <span>${formatLeft(left)}</span>
          <span>${new Date(note.createdAt).toLocaleString()}</span>
        </div>

        <div class="note-actions">
          <button type="button" data-a="flag" data-id="${note.id}">${note.flagged?'Unflag':'Flag'}</button>
          <button type="button" data-a="extend" data-id="${note.id}">+1d</button>
          <button type="button" data-a="del" data-id="${note.id}">Delete</button>
        </div>
      </div>
    `;
  }).join('');
}

function addNote(){
  const text=noteText.value.trim();
  const hours=getHours();
  if(!text || !hours) return;

  const notes=removeExpired(loadNotes());
  notes.unshift(createNote(text,hours,importantBtn.classList.contains('active')));
  saveNotes(notes);

  noteText.value='';
  customHours.value='';
  importantBtn.classList.remove('active');
  importantBtn.setAttribute('aria-pressed','false');
  if(preset.value==='custom') preset.value='24';
  customHours.disabled=true;

  render();
}

function applyTheme(theme){
  document.body.classList.toggle('dark', theme==='dark');
  themeToggle.textContent = theme==='dark' ? '☀️' : '🌙';
}

preset.addEventListener('change',()=>{
  customHours.disabled = preset.value !== 'custom';
  if(!customHours.disabled) customHours.focus();
});

addBtn.addEventListener('click',addNote);

importantBtn.addEventListener('click',()=>{
  const active=importantBtn.classList.toggle('active');
  importantBtn.setAttribute('aria-pressed', String(active));
});

themeToggle.addEventListener('click',()=>{
  const next=document.body.classList.contains('dark') ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY,next);
  applyTheme(next);
});

noteList.addEventListener('click',e=>{
  const btn=e.target.closest('button[data-a]');
  if(!btn) return;

  const id=btn.dataset.id;
  const action=btn.dataset.a;
  let notes=loadNotes();

  if(action==='del') notes=notes.filter(n=>n.id!==id);
  if(action==='extend') notes=notes.map(n=>n.id===id ? {...n,expiresAt:n.expiresAt+86400000} : n);
  if(action==='flag') notes=notes.map(n=>n.id===id ? {...n,flagged:!n.flagged} : n);

  saveNotes(notes);
  render();
});

noteText.addEventListener('keydown',e=>{
  if((e.ctrlKey || e.metaKey) && e.key==='Enter') addNote();
});

applyTheme(localStorage.getItem(THEME_KEY)||'dark');

new Sortable(noteList,{
  animation:150,
  handle:'.note-handle',
  delayOnTouchOnly:true,
  delay:120,
  onEnd:()=>{
    const ids=[...noteList.querySelectorAll('.note[data-id]')].map(n=>n.dataset.id);
    let notes=removeExpired(loadNotes());
    notes=ids.map((id,index)=>{
      const found=notes.find(n=>n.id===id);
      return found ? {...found,order:index+1} : null;
    }).filter(Boolean);
    saveNotes(notes);
    render();
  }
});

render();
setInterval(render,30000);
</script>
</body>
</html>
