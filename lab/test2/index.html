
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadeNotes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f4f6f8;
--panel:#eef2f6;
--note-base:#ffffff;
--text:#1d1d1f;
--muted:#6f7682;
--border:#e1e6ee;

--flag:#ef9a9a;
--flag-soft:rgba(239,154,154,0.16);

--favorite:#d8a93a;
--favorite-soft:rgba(216,169,58,0.18);

--shadow:0 10px 28px rgba(15,23,42,0.08);
--note-shadow:0 8px 18px rgba(15,23,42,0.10);
}

body.dark{

--bg:#0f141a;
--panel:#1c2430;
--note-base:#3a4658;

--text:#f3f4f6;
--muted:#a7b0bd;

--border:rgba(255,255,255,0.08);

--flag:#ff9a9a;
--flag-soft:rgba(255,154,154,0.15);

--favorite:#f1c75b;
--favorite-soft:rgba(241,199,91,0.18);

--shadow:0 12px 30px rgba(0,0,0,.45);
--note-shadow:0 10px 26px rgba(0,0,0,.35);

}

body{
margin:0;
font-family:"Inter",system-ui,sans-serif;
background:var(--bg);
color:var(--text);
}

body.dark{
background:linear-gradient(180deg,#111821 0%,#0f141a 100%);
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
margin:0;
font-size:28px;
}

.theme-toggle{
cursor:pointer;
font-size:20px;
width:48px;
height:48px;
border-radius:12px;
border:1px solid var(--border);
background:var(--note-base);
display:flex;
align-items:center;
justify-content:center;
}

.grid{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
}

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:16px;
padding:16px;
box-shadow:var(--shadow);
}

textarea{
width:100%;
min-height:160px;
padding:12px;
border-radius:12px;
border:1px solid var(--border);
background:var(--note-base);
color:var(--text);
}

textarea::placeholder{
color:var(--muted);
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

select,input{
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--note-base);
color:var(--text);
}

.actions{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:12px;
}

button{
cursor:pointer;
border-radius:12px;
border:none;
padding:12px;
font-weight:600;
}

.primary{
background:#2f2f33;
color:white;
}

.icon-button{
background:var(--note-base);
border:1px solid var(--border);
}

.note-list{
display:grid;
gap:12px;
margin-top:10px;
}

.note{
background:var(--note-base);
border:1px solid var(--border);
border-radius:14px;
padding:14px;
box-shadow:var(--note-shadow);
transition:transform .2s ease;
}

.note:hover{
transform:translateY(-2px);
}

.note.flagged{
box-shadow:0 0 0 2px var(--flag-soft), var(--note-shadow);
}

.note.favorite{
box-shadow:0 0 0 2px var(--favorite-soft), var(--note-shadow);
}

.meta{
font-size:12px;
color:var(--muted);
display:flex;
justify-content:space-between;
margin-top:6px;
}

.note-actions{
display:flex;
gap:6px;
margin-top:8px;
}

.note-actions button{
font-size:12px;
padding:8px;
border-radius:8px;
background:var(--panel);
border:1px solid var(--border);
}

@media(max-width:800px){
.grid{grid-template-columns:1fr}
}

</style>
</head>

<body class="dark">

<div class="wrap">

<header>
<h1>FadeNotes</h1>
<button class="theme-toggle" id="themeToggle">☀️</button>
</header>

<div class="grid">

<div class="card">

<textarea id="noteText" placeholder="Write temporary note..."></textarea>

<div class="row">
<select id="preset">
<option value="1">1 hour</option>
<option value="6">6 hours</option>
<option value="24" selected>1 day</option>
<option value="72">3 days</option>
</select>

<input id="customHours" type="number" placeholder="Custom hours">
</div>

<div class="actions">
<button class="primary" id="saveBtn">Save</button>
<button class="icon-button" id="flagBtn">⚑</button>
<button class="icon-button" id="favBtn">★</button>
</div>

</div>

<div class="card">

<div id="summary">0 active notes</div>

<div id="noteList" class="note-list"></div>

</div>

</div>

</div>

<script>

const noteText=document.getElementById("noteText");
const preset=document.getElementById("preset");
const saveBtn=document.getElementById("saveBtn");
const flagBtn=document.getElementById("flagBtn");
const favBtn=document.getElementById("favBtn");
const noteList=document.getElementById("noteList");
const summary=document.getElementById("summary");
const themeToggle=document.getElementById("themeToggle");

let flagged=false;
let favorite=false;

function load(){
return JSON.parse(localStorage.getItem("fadenotes")||"[]");
}

function save(data){
localStorage.setItem("fadenotes",JSON.stringify(data));
}

function render(){

let notes=load();

summary.textContent=notes.length+" active notes";

noteList.innerHTML="";

notes.forEach((n,i)=>{

let div=document.createElement("div");
div.className="note";

if(n.flagged) div.classList.add("flagged");
if(n.favorite) div.classList.add("favorite");

div.innerHTML=`
<div>${n.text}</div>

<div class="meta">
<span>${n.hours}h</span>
<span>#${i+1}</span>
</div>

<div class="note-actions">
<button onclick="deleteNote(${i})">Delete</button>
</div>
`;

noteList.appendChild(div);

});

}

function deleteNote(i){
let notes=load();
notes.splice(i,1);
save(notes);
render();
}

saveBtn.onclick=()=>{

let text=noteText.value.trim();
if(!text) return;

let hours=preset.value;

let notes=load();

notes.unshift({
text:text,
hours:hours,
flagged:flagged,
favorite:favorite
});

save(notes);

noteText.value="";
flagged=false;
favorite=false;

render();

};

flagBtn.onclick=()=>{
flagged=!flagged;
flagBtn.style.opacity=flagged?1:.5;
};

favBtn.onclick=()=>{
favorite=!favorite;
favBtn.style.opacity=favorite?1:.5;
};

themeToggle.onclick=()=>{
document.body.classList.toggle("dark");
themeToggle.textContent=document.body.classList.contains("dark")?"☀️":"🌙";
};

render();

</script>

</body>
</html>
