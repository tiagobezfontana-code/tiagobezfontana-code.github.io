<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FadeNotes Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef2f7;
      --bg-2: #e6ebf3;
      --panel: rgba(255, 255, 255, 0.74);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.52);
      --text: #1d2433;
      --muted: #6f7b91;
      --accent: #ff7a45;
      --accent-2: #5f8dff;
      --border: rgba(255, 255, 255, 0.55);
      --shadow: 0 10px 30px rgba(73, 89, 120, 0.10);
      --shadow-strong: 0 18px 45px rgba(73, 89, 120, 0.16);
      --danger: #d84f67;
      --warn: #e5a432;
      --ok: #4ea66c;
      --fresh: linear-gradient(135deg, #edf4ff 0%, #dce8ff 100%);
      --aging: linear-gradient(135deg, #fff7dd 0%, #ffe9b0 100%);
      --fading: linear-gradient(135deg, #ffe5dc 0%, #ffc8b6 100%);
    }

    body.dark {
      --bg: #111826;
      --bg-2: #0d1420;
      --panel: rgba(24, 34, 51, 0.74);
      --panel-strong: rgba(27, 39, 58, 0.92);
      --panel-soft: rgba(31, 43, 63, 0.50);
      --text: #edf2ff;
      --muted: #9eacc8;
      --accent: #ff8b57;
      --accent-2: #7da0ff;
      --border: rgba(255, 255, 255, 0.09);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.30);
      --shadow-strong: 0 24px 50px rgba(0, 0, 0, 0.42);
      --danger: #ff7a90;
      --warn: #ffc262;
      --ok: #7fd59a;
      --fresh: linear-gradient(135deg, rgba(71, 106, 173, 0.50) 0%, rgba(86, 127, 214, 0.38) 100%);
      --aging: linear-gradient(135deg, rgba(164, 120, 33, 0.46) 0%, rgba(209, 158, 55, 0.34) 100%);
      --fading: linear-gradient(135deg, rgba(171, 84, 59, 0.52) 0%, rgba(214, 114, 85, 0.34) 100%);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 255, 255, 0.85), transparent 22%),
        radial-gradient(circle at 88% 14%, rgba(255, 180, 145, 0.34), transparent 20%),
        radial-gradient(circle at 50% 100%, rgba(95, 141, 255, 0.10), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    body.dark {
      background:
        radial-gradient(circle at 10% 12%, rgba(125, 160, 255, 0.10), transparent 20%),
        radial-gradient(circle at 88% 10%, rgba(255, 139, 87, 0.13), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(125, 160, 255, 0.08), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    .wrap {
      width: min(980px, calc(100% - 22px));
      margin: 0 auto;
      padding: 14px 0 28px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .hero-left {
      min-width: 0;
      flex: 1 1 auto;
    }

    .hero-right {
      flex: 0 0 auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      background: var(--panel-soft);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1.02;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      max-width: 700px;
    }

    .theme-toggle {
      width: 50px;
      height: 50px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: var(--text);
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .form-card {
      padding: 18px;
      position: sticky;
      top: 12px;
      align-self: start;
    }

    .list-card {
      padding: 12px;
    }

    .card-title {
      margin: 0 0 10px;
      font-size: 21px;
      letter-spacing: -0.02em;
    }

    label {
      display: block;
      margin: 12px 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    textarea, select, input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: var(--text);
      border-radius: 20px;
      padding: 14px 15px;
      font-size: 16px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    }

    body.dark textarea,
    body.dark select,
    body.dark input {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    textarea {
      min-height: 240px;
      resize: vertical;
      line-height: 1.45;
    }

    textarea:focus, select:focus, input:focus {
      border-color: rgba(95, 141, 255, 0.45);
      box-shadow: 0 0 0 4px rgba(95, 141, 255, 0.10);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 13px 14px;
      font-size: 15px;
      min-height: 50px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, background 0.18s ease;
      font-family: inherit;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent) 0%, #ff9968 100%);
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(255, 122, 69, 0.25);
    }

    .secondary {
      background: var(--panel-strong);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .flag-button {
      width: 54px;
      padding: 0;
      font-size: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .flag-button.active {
      background: linear-gradient(135deg, #fff3d8 0%, #ffe7aa 100%);
      color: #cb8a10;
      border: 1px solid rgba(229, 164, 50, 0.26);
      box-shadow: 0 10px 24px rgba(229, 164, 50, 0.16);
    }

    body.dark .flag-button.active {
      background: linear-gradient(135deg, rgba(164, 120, 33, 0.46) 0%, rgba(209, 158, 55, 0.32) 100%);
      color: #ffd37d;
    }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 8px 12px;
    }

    .list-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .note-list {
      display: grid;
      gap: 12px;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 22px;
      background: var(--panel-soft);
      backdrop-filter: blur(16px);
      line-height: 1.45;
      font-size: 15px;
    }

    .note {
      background: var(--fresh);
      border: 1px solid rgba(255,255,255,0.42);
      border-radius: 24px;
      padding: 15px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.35s ease, filter 0.35s ease;
      box-shadow: var(--shadow);
    }

    .note:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-strong);
    }

    .note.note-aging {
      background: var(--aging);
    }

    .note.note-fading {
      background: var(--fading);
    }

    .note.flagged {
      box-shadow: 0 16px 36px rgba(229, 164, 50, 0.16);
    }

    .note.dragging {
      opacity: 0.76 !important;
      transform: scale(1.01);
    }

    .note-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .note-top-left {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .note-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      font-size: 15px;
      color: var(--text);
    }

    .pill {
      font-size: 12px;
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.46);
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    body.dark .pill {
      background: rgba(17, 26, 43, 0.42);
      border-color: rgba(255,255,255,0.08);
    }

    .pill.flag {
      color: #9a6710;
      background: rgba(255, 243, 216, 0.88);
      border-color: rgba(229, 164, 50, 0.28);
      font-weight: 700;
    }

    body.dark .pill.flag {
      color: #ffd37d;
      background: rgba(164, 120, 33, 0.34);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .time {
      font-size: 13px;
      color: var(--muted);
    }

    .note-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tiny {
      padding: 9px 11px;
      font-size: 13px;
      border-radius: 14px;
      min-height: 40px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(255,255,255,0.48);
      color: var(--text);
    }

    body.dark .tiny {
      background: rgba(17, 26, 43, 0.35);
      border-color: rgba(255,255,255,0.08);
    }

    .tiny.danger {
      color: var(--danger);
    }

    .tiny.extend {
      color: var(--ok);
    }

    .tiny.flag-toggle {
      color: var(--warn);
    }

    .note-handle {
      width: 34px;
      min-width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.42);
      background: rgba(255,255,255,0.50);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: grab;
      touch-action: none;
      user-select: none;
      backdrop-filter: blur(10px);
    }

    body.dark .note-handle {
      background: rgba(17, 26, 43, 0.35);
      border-color: rgba(255,255,255,0.08);
    }

    .note-handle:active {
      cursor: grabbing;
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .form-card {
        position: static;
      }
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100%, calc(100% - 14px));
        padding-top: 10px;
      }

      .hero {
        align-items: center;
        margin-bottom: 12px;
      }

      .badge {
        font-size: 11px;
      }

      .sub {
        font-size: 13px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: 1fr auto;
      }

      .list-head,
      .meta,
      .note-top {
        align-items: flex-start;
      }

      .note-actions {
        width: 100%;
      }

      .note-actions .tiny {
        flex: 1 1 auto;
      }

      .theme-toggle {
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="hero-left">
        <div class="badge">FadeNotes Lab · soft card theme</div>
        <h1>Notes that expire on purpose.</h1>
        <p class="sub">Soft floating cards, clean mobile spacing, and notes that visually fade away as expiration gets closer.</p>
      </div>
      <div class="hero-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Switch to light mode" title="Switch to light mode">☀️</button>
      </div>
    </section>

    <section class="grid">
      <article class="card form-card">
        <h2 class="card-title">New note</h2>

        <label for="noteText">Note</label>
        <textarea id="noteText" placeholder="Examples: parking spot B12, door code, item to buy tomorrow..."></textarea>

        <div class="row">
          <div>
            <label for="preset">Expires in</label>
            <select id="preset">
              <option value="1">1 hour</option>
              <option value="6">6 hours</option>
              <option value="12">12 hours</option>
              <option value="24" selected>1 day</option>
              <option value="72">3 days</option>
              <option value="168">7 days</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div>
            <label for="customHours">Custom hours</label>
            <input id="customHours" type="number" min="1" step="1" placeholder="Example: 36" disabled />
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="addBtn">Save</button>
          <button class="secondary flag-button" id="importantBtn" type="button" aria-pressed="false" title="Flag as important">⚑</button>
        </div>
      </article>

      <article class="card list-card">
        <div class="list-head">
          <div>
            <h2 class="card-title">Your temporary notes</h2>
            <p id="summary">0 active notes</p>
          </div>
        </div>

        <div id="noteList" class="note-list"></div>
      </article>
    </section>

    <div class="footer">Version v0.1 · Designed by Tiago Fontana</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script>
    const STORAGE_KEY = 'fadenotes-lab-v1';
    const THEME_KEY = 'fadenotes-theme-v1';

    const noteText = document.getElementById('noteText');
    const preset = document.getElementById('preset');
    const customHours = document.getElementById('customHours');
    const addBtn = document.getElementById('addBtn');
    const importantBtn = document.getElementById('importantBtn');
    const noteList = document.getElementById('noteList');
    const summary = document.getElementById('summary');
    const themeToggle = document.getElementById('themeToggle');

    function loadNotes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveNotes(notes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function saveTheme(theme) {
      localStorage.setItem(THEME_KEY, theme);
    }

    function loadTheme() {
      return localStorage.getItem(THEME_KEY) || 'dark';
    }

    function applyTheme(theme) {
      document.body.classList.toggle('dark', theme === 'dark');
      themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
      themeToggle.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
      themeToggle.setAttribute('aria-label', themeToggle.title);
    }

    function getHours() {
      if (preset.value === 'custom') {
        const value = Number(customHours.value);
        return Number.isFinite(value) && value > 0 ? value : null;
      }
      return Number(preset.value);
    }

    function createNote(text, hours, flagged) {
      const now = Date.now();
      return {
        id: crypto.randomUUID(),
        text,
        flagged,
        createdAt: now,
        expiresAt: now + hours * 60 * 60 * 1000,
        order: now,
      };
    }

    function removeExpired(notes) {
      const now = Date.now();
      return notes.filter(note => note.expiresAt > now);
    }

    function formatRemaining(ms) {
      if (ms <= 0) return 'expired';
      const totalMinutes = Math.floor(ms / 60000);
      const days = Math.floor(totalMinutes / (60 * 24));
      const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
      const minutes = totalMinutes % 60;

      if (days > 0) return `${days}d ${hours}h left`;
      if (hours > 0) return `${hours}h ${minutes}m left`;
      return `${minutes}m left`;
    }

    function formatCreated(ts) {
      return new Date(ts).toLocaleString();
    }

    function getProgress(note) {
      const total = Math.max(1, note.expiresAt - note.createdAt);
      const left = note.expiresAt - Date.now();
      return Math.max(0, Math.min(1, left / total));
    }

    function getOpacity(note) {
      const ratio = getProgress(note);
      return 0.12 + ratio * 0.88;
    }

    function getScale(note) {
      const ratio = getProgress(note);
      return 0.975 + ratio * 0.025;
    }

    function getBlur(note) {
      const ratio = getProgress(note);
      return (1 - ratio) * 0.8;
    }

    function getStatus(note) {
      const ratio = getProgress(note);
      if (ratio > 0.6) return 'Fresh';
      if (ratio > 0.25) return 'Aging';
      return 'Fading';
    }

    function getThemeClass(note) {
      const ratio = getProgress(note);
      if (ratio > 0.6) return 'note-fresh';
      if (ratio > 0.25) return 'note-aging';
      return 'note-fading';
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function saveVisualOrder() {
      const ids = Array.from(noteList.querySelectorAll('.note[data-id]')).map(note => note.dataset.id);
      let notes = removeExpired(loadNotes());
      notes = ids.map((id, index) => {
        const found = notes.find(note => note.id === id);
        return found ? { ...found, order: index + 1 } : null;
      }).filter(Boolean);
      saveNotes(notes);
      render();
    }

    function render() {
      let notes = removeExpired(loadNotes());
      saveNotes(notes);

      notes.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));

      const flaggedCount = notes.filter(note => note.flagged).length;
      summary.textContent = `${notes.length} active note${notes.length === 1 ? '' : 's'}${flaggedCount ? ` · ${flaggedCount} flagged` : ''}`;

      if (!notes.length) {
        noteList.innerHTML = '<div class="empty">No temporary notes yet.<br>Write one above and it will expire automatically.</div>';
        return;
      }

      noteList.innerHTML = notes.map(note => {
        const left = note.expiresAt - Date.now();
        const opacity = getOpacity(note);
        const scale = getScale(note);
        const blur = getBlur(note);
        const statusLabel = getStatus(note);
        const themeClass = getThemeClass(note);
        return `
          <div class="note ${themeClass} ${note.flagged ? 'flagged' : ''}" data-id="${note.id}" style="opacity:${opacity}; transform:scale(${scale}); filter:blur(${blur}px);">
            <div class="note-top">
              <div class="note-top-left">
                ${note.flagged ? '<div class="pill flag">⚑ Important</div>' : ''}
                <div class="pill">${statusLabel}</div>
              </div>
              <div style="display:flex; gap:8px; align-items:center;">
                <div class="pill">${formatRemaining(left)}</div>
                <div class="note-handle" title="Drag to reorder" aria-label="Drag to reorder">☰</div>
              </div>
            </div>
            <div class="note-text">${escapeHtml(note.text)}</div>
            <div class="meta">
              <div class="time">Created ${formatCreated(note.createdAt)}</div>
              <div class="note-actions">
                <button class="tiny flag-toggle" data-action="toggle-flag" data-id="${note.id}">${note.flagged ? 'Unflag' : 'Flag'}</button>
                <button class="tiny extend" data-action="extend" data-id="${note.id}">+1 day</button>
                <button class="tiny danger" data-action="delete" data-id="${note.id}">Delete</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function addNote() {
      const text = noteText.value.trim();
      const hours = getHours();

      if (!text) {
        alert('Write a note first.');
        return;
      }

      if (!hours) {
        alert('Choose a valid expiration time.');
        return;
      }

      const notes = removeExpired(loadNotes());
      notes.unshift(createNote(text, hours, importantBtn.classList.contains('active')));
      saveNotes(notes);
      noteText.value = '';
      customHours.value = '';
      importantBtn.classList.remove('active');
      importantBtn.setAttribute('aria-pressed', 'false');
      if (preset.value === 'custom') {
        preset.value = '24';
      }
      customHours.disabled = true;
      render();
    }

    preset.addEventListener('change', () => {
      customHours.disabled = preset.value !== 'custom';
      if (!customHours.disabled) {
        customHours.focus();
      }
    });

    addBtn.addEventListener('click', addNote);

    importantBtn.addEventListener('click', () => {
      const isActive = importantBtn.classList.toggle('active');
      importantBtn.setAttribute('aria-pressed', String(isActive));
    });

    themeToggle.addEventListener('click', () => {
      const next = document.body.classList.contains('dark') ? 'light' : 'dark';
      saveTheme(next);
      applyTheme(next);
    });

    noteList.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;

      const action = button.dataset.action;
      const id = button.dataset.id;
      let notes = removeExpired(loadNotes());

      if (action === 'delete') {
        notes = notes.filter(note => note.id !== id);
      }

      if (action === 'extend') {
        notes = notes.map(note =>
          note.id === id
            ? { ...note, expiresAt: note.expiresAt + 24 * 60 * 60 * 1000 }
            : note
        );
      }

      if (action === 'toggle-flag') {
        notes = notes.map(note =>
          note.id === id
            ? { ...note, flagged: !note.flagged }
            : note
        );
      }

      saveNotes(notes);
      render();
    });

    noteText.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        addNote();
      }
    });

    applyTheme(loadTheme());

    const sortable = new Sortable(noteList, {
      animation: 180,
      handle: '.note-handle',
      ghostClass: 'dragging',
      delayOnTouchOnly: true,
      delay: 120,
      onEnd: saveVisualOrder,
    });

    render();
    setInterval(render, 30000);
  </script>
</body>
</html>
