
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FadeNotes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#f4f6f8;
  --panel:#eef2f6;
  --panel-2:#f7f9fc;
  --note-base:#ffffff;
  --text:#1d1d1f;
  --muted:#6f7682;
  --border:#e1e6ee;

  --flag:#ef9a9a;
  --flag-soft:rgba(239,154,154,0.16);

  --favorite:#d8a93a;
  --favorite-soft:rgba(216,169,58,0.18);

  --button:#2f2f33;
  --button-text:#ffffff;

  --fresh:#ffffff;
  --aging:#fff4df;
  --fading:#fff0f0;

  --shadow:0 10px 28px rgba(15,23,42,0.08);
  --note-shadow:0 8px 18px rgba(15,23,42,0.10);
}

/* -------- DARK GLASS THEME -------- */

body.dark{

  --text:#f2f4f7;
  --muted:#a9b1bd;

  --panel:rgba(43,52,66,0.65);
  --panel-2:rgba(58,70,88,0.55);
  --note-base:rgba(72,86,106,0.72);

  --border:rgba(255,255,255,0.08);

  --flag:#ffb1b1;
  --flag-soft:rgba(255,177,177,0.12);

  --favorite:#f1c75b;
  --favorite-soft:rgba(241,199,91,0.16);

  --button:#f2f4f7;
  --button-text:#15171b;

  --fresh:rgba(72,86,106,0.72);
  --aging:rgba(86,76,51,0.78);
  --fading:rgba(88,64,66,0.78);

  --shadow:0 12px 30px rgba(0,0,0,0.34);
  --note-shadow:0 10px 22px rgba(0,0,0,0.28);
}

/* Background */

body{
margin:0;
font-family:"Inter",system-ui,sans-serif;
background:var(--bg);
color:var(--text);
}

body.dark{
background:
radial-gradient(circle at top left, rgba(86,110,145,0.18), transparent 28%),
linear-gradient(180deg,#1a2330 0%,#121821 100%);
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
margin:0;
font-size:28px;
}

.theme-toggle{
cursor:pointer;
font-size:22px;
width:48px;
height:48px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
border:1px solid var(--border);
background:var(--note-base);
}

.grid{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
}

/* Cards */

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:18px;
padding:16px;
box-shadow:var(--shadow);

backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
}

textarea{
width:100%;
min-height:160px;
padding:12px;
border-radius:12px;
border:1px solid var(--border);
background:var(--note-base);
color:var(--text);
}

textarea::placeholder{
color:var(--muted);
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

select,input{
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--note-base);
color:var(--text);
}

/* Buttons */

.actions{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:12px;
}

button{
cursor:pointer;
border-radius:12px;
border:none;
padding:12px;
font-weight:600;
}

.primary{
background:var(--button);
color:var(--button-text);
}

.icon-button{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
}

/* Notes */

.note-list{
display:grid;
gap:12px;
}

.note{
background:var(--fresh);
border:1px solid var(--border);
border-radius:14px;
padding:14px;
box-shadow:var(--note-shadow);

backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
}

.note.flagged{
box-shadow:0 0 0 2px var(--flag-soft), var(--note-shadow);
}

.note.favorite{
box-shadow:0 0 0 2px var(--favorite-soft), var(--note-shadow);
}

.meta{
font-size:12px;
color:var(--muted);
margin-top:6px;
display:flex;
justify-content:space-between;
}

.note-actions{
display:flex;
gap:6px;
margin-top:8px;
}

.note-actions button{
font-size:12px;
padding:8px;
border-radius:8px;
background:var(--panel-2);
border:1px solid var(--border);
}

@media(max-width:800px){
.grid{grid-template-columns:1fr}
}

</style>
</head>

<body class="dark">

<div class="wrap">

<header>
<h1>FadeNotes</h1>
<button class="theme-toggle" id="themeToggle">☀️</button>
</header>

<div class="grid">

<div class="card">

<textarea placeholder="Write temporary note..."></textarea>

<div class="row">
<select>
<option>1 hour</option>
<option>6 hours</option>
<option selected>1 day</option>
<option>3 days</option>
</select>

<input type="number" placeholder="Custom hours">
</div>

<div class="actions">
<button class="primary">Save</button>
<button class="icon-button">⚑</button>
<button class="icon-button">★</button>
</div>

</div>

<div class="card">

<div>Example Notes</div>

<div class="note favorite">
★ Favorite note example
<div class="meta">
<span>9h left</span>
<span>4/11/2026</span>
</div>
</div>

<div class="note flagged">
⚑ Flagged note example
<div class="meta">
<span>23h left</span>
<span>4/11/2026</span>
</div>
</div>

</div>

</div>

</div>

<script>
const btn=document.getElementById("themeToggle");
btn.onclick=()=>{
document.body.classList.toggle("dark");
btn.textContent=document.body.classList.contains("dark")?"☀️":"🌙";
}
</script>

</body>
</html>
