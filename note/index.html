
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fade notepad</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --bg-2: #eaf0f8;
      --panel: #ffffff;
      --panel-2: #f7f9fd;
      --text: #172033;
      --muted: #64748b;
      --accent: #4f7cff;
      --accent-2: #315ee8;
      --danger: #d64b63;
      --warn: #d48a1c;
      --ok: #2f9b51;
      --border: rgba(23,32,51,0.08);
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
    }

    body.dark {
      --bg: #0b1220;
      --bg-2: #121b2d;
      --panel: #111a2b;
      --panel-2: #182338;
      --text: #e8eefc;
      --muted: #9fb0d1;
      --accent: #7aa2ff;
      --accent-2: #5b8cff;
      --danger: #ff6b81;
      --warn: #ffb454;
      --ok: #7bd88f;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 16px 40px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, color-mix(in srgb, var(--accent) 15%, transparent), transparent 30%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    body {
      transition: background 0.25s ease, color 0.25s ease;
    }

    .wrap {
      width: min(960px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 34px;
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .hero-left {
      min-width: 0;
      flex: 1 1 300px;
    }

    .hero-right {
      display: flex;
      align-items: start;
      justify-content: end;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 7vw, 46px);
      line-height: 1.02;
      letter-spacing: -0.02em;
      padding-right: 8px;
    }

    .sub {
      color: var(--muted);
      margin-top: 8px;
      max-width: 700px;
      font-size: 15px;
      line-height: 1.4;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
      backdrop-filter: blur(6px);
    }

    .theme-toggle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .form-card {
      padding: 16px;
      position: sticky;
      top: 14px;
      align-self: start;
    }

    .card-title {
      font-size: 20px;
      margin: 0 0 6px;
    }

    label {
      display: block;
      font-size: 14px;
      margin: 12px 0 8px;
      color: var(--muted);
    }

    textarea, select, input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 16px;
      outline: none;
      box-shadow: none;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
    }

    textarea::placeholder {
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0.01em;
      color: var(--muted);
      opacity: 0.9;
    }

    textarea:focus, select:focus, input:focus {
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .flag-button.active {
      background: rgba(212,138,28,0.16);
      color: var(--warn);
      border: 1px solid rgba(212,138,28,0.28);
      font-weight: 700;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
      min-height: 48px;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary {
      background: var(--accent);
      color: white;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .list-card {
      padding: 12px;
    }

    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 8px 14px;
    }

    .list-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .note-list {
      display: grid;
      gap: 12px;
      grid-auto-rows: max-content;
      align-items: start;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.02);
      line-height: 1.45;
      font-size: 15px;
    }

    .note {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 15px;
      transition: opacity 0.3s ease, transform 0.3s ease;
      height: auto;
      min-height: 0;
      align-self: start;
    }

    .note.flagged {
      border-color: color-mix(in srgb, var(--warn) 35%, var(--border));
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--warn) 22%, transparent);
    }

    .note-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 10px;
      height: auto;
      min-height: 0;
    }

    .note-top-left {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .note-top-right {
      min-width: 180px;
      max-width: 220px;
      flex: 0 1 220px;
      height: auto;
      min-height: 0;
    }

    .note-text {
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 15px;
      word-break: break-word;
      margin: 0;
      height: auto;
      min-height: 0;
    }

    .pill {
      font-size: 12px;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .pill.flag {
      color: #fff;
      background: color-mix(in srgb, var(--warn) 72%, transparent);
      border-color: color-mix(in srgb, var(--warn) 45%, transparent);
    }

    .progress-line {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .progress-bar {
      flex: 1 1 auto;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      min-width: 90px;
    }

    .progress-fill {
      height: 100%;
      width: var(--progress, 100%);
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .time {
      font-size: 13px;
      color: var(--muted);
    }

    .note-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tiny {
      padding: 9px 11px;
      font-size: 13px;
      border-radius: 12px;
      min-height: 40px;
    }

    .tiny.danger {
      background: rgba(214,75,99,0.12);
      color: var(--danger);
      border: 1px solid rgba(214,75,99,0.18);
    }

    .tiny.extend {
      background: rgba(47,155,81,0.12);
      color: var(--ok);
      border: 1px solid rgba(47,155,81,0.18);
    }

    .tiny.flag-toggle {
      background: rgba(212,138,28,0.12);
      color: var(--warn);
      border: 1px solid rgba(212,138,28,0.18);
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .form-card { position: static; }
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100%, calc(100% - 16px));
        padding-top: 12px;
      }

      .hero {
        align-items: center;
        margin-bottom: 12px;
      }

      .badge { font-size: 12px; }
      .row { grid-template-columns: 1fr; }

      .actions {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .actions button {
        padding-left: 8px;
        padding-right: 8px;
        font-size: 13px;
      }

      .list-head, .meta { align-items: flex-start; }

      .note-top {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: start;
        margin-bottom: 10px;
      }

      .note-top-right {
        min-width: 0;
        max-width: 100%;
        width: 100%;
      }

      .note, .note-text, .note-top, .note-top-right, .meta {
        height: auto;
        min-height: 0;
      }

      .note-actions { width: 100%; }
      .note-actions .tiny { flex: 1 1 auto; }

      .theme-toggle {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="hero-left">
        <div class="badge">FadeNotes · temporary notes that clean themselves</div>
        <h1>Notes that expire on purpose.</h1>
        <p class="sub">100% secured, notes are kept on you hardware. Choose how long they should last.</p>
      </div>
      <div class="hero-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark mode" title="Toggle light and dark mode">🌙</button>
      </div>
    </section>

    <section class="grid">
      <article class="card form-card">
        <h2 class="card-title">New note</h2>
        <label for="noteText"></label>
        <textarea id="noteText" placeholder="Parking spot B12, door code, item to buy tomorrow..."></textarea>

        <div class="row">
          <div>
            <label for="preset">Expires in</label>
            <select id="preset">
              <option value="1">1 hour</option>
              <option value="6">6 hours</option>
              <option value="12">12 hours</option>
              <option value="24" selected>1 day</option>
              <option value="72">3 days</option>
              <option value="168">7 days</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div>
            <label for="customHours">Custom hours</label>
            <input id="customHours" type="number" min="1" step="1" placeholder="36" disabled />
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="addBtn">Save note</button>
          <button class="secondary flag-button" id="importantBtn" type="button" aria-pressed="false">Flag as important</button>
        </div>
      </article>

      <article class="card list-card">
        <div class="list-head">
          <div>
            <h2 class="card-title">Your temporary notes</h2>
            <p id="summary">0 active notes</p>
          </div>
        </div>
        <div id="noteList" class="note-list"></div>
      </article>
    </section>

    <div class="footer">Version v0.1 · Designed by Tiago Fontana</div>
  </main>

  <script>
    const STORAGE_KEY='fadenotes-lab-v1';
    const THEME_KEY='fadenotes-theme-v1';
    const noteText=document.getElementById('noteText');
    const preset=document.getElementById('preset');
    const customHours=document.getElementById('customHours');
    const importantBtn=document.getElementById('importantBtn');
    const addBtn=document.getElementById('addBtn');
    const noteList=document.getElementById('noteList');
    const summary=document.getElementById('summary');
    const themeToggle=document.getElementById('themeToggle');

    function loadNotes(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
    function saveNotes(notes){ localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
    function saveTheme(theme){ localStorage.setItem(THEME_KEY, theme); }
    function loadTheme(){ return localStorage.getItem(THEME_KEY) || 'dark'; }

    function applyTheme(theme){
      document.body.classList.toggle('dark', theme === 'dark');
      themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
      themeToggle.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
      themeToggle.setAttribute('aria-label', themeToggle.title);
    }

    function getHours(){
      if (preset.value === 'custom') {
        const value = Number(customHours.value);
        return Number.isFinite(value) && value > 0 ? value : null;
      }
      return Number(preset.value);
    }

    function createNote(text, hours, flagged){
      const now = Date.now();
      return { id: crypto.randomUUID(), text, flagged, createdAt: now, expiresAt: now + hours * 60 * 60 * 1000 };
    }

    function removeExpired(notes){
      const now = Date.now();
      return notes.filter(note => note.expiresAt > now);
    }

    function getProgress(note){
      const total = Math.max(1, note.expiresAt - note.createdAt);
      const left = note.expiresAt - Date.now();
      return Math.max(0, Math.min(1, left / total));
    }

    function formatRemaining(ms){
      if (ms <= 0) return 'expired';
      const totalMinutes = Math.floor(ms / 60000);
      const days = Math.floor(totalMinutes / (60 * 24));
      const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
      const minutes = totalMinutes % 60;
      if (days > 0) return `${days}d ${hours}h left`;
      if (hours > 0) return `${hours}h ${minutes}m left`;
      return `${minutes}m left`;
    }

    function formatCreated(ts){ return new Date(ts).toLocaleString(); }

    function getOpacity(note){
      const ratio = getProgress(note);
      return 0.28 + ratio * 0.72;
    }

    function getStatus(note){
      const ratio = getProgress(note);
      if (ratio > 0.6) return 'Fresh';
      if (ratio > 0.25) return 'Aging';
      return 'Fading';
    }

    function getProgressPercent(note){
      return `${Math.max(6, Math.round(getProgress(note) * 100))}%`;
    }

    function escapeHtml(text){
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function render(){
      let notes = removeExpired(loadNotes());
      saveNotes(notes);

      notes.sort((a, b) => {
        if (a.flagged !== b.flagged) return a.flagged ? -1 : 1;
        return a.expiresAt - b.expiresAt;
      });

      const flaggedCount = notes.filter(note => note.flagged).length;
      summary.textContent = `${notes.length} active note${notes.length === 1 ? '' : 's'}${flaggedCount ? ` · ${flaggedCount} flagged` : ''}`;

      if (!notes.length) {
        noteList.innerHTML = '<div class="empty">No temporary notes yet.<br>Write one above and it will expire automatically.</div>';
        return;
      }

      noteList.innerHTML = notes.map(note => {
        const left = note.expiresAt - Date.now();
        const opacity = getOpacity(note);
        const statusLabel = getStatus(note);
        const progressWidth = getProgressPercent(note);
        return `
          <div class="note ${note.flagged ? 'flagged' : ''}" style="opacity:${opacity}">
            <div class="note-top">
              <div class="note-top-left">
                ${note.flagged ? '<div class="pill flag">⚑ Important</div>' : ''}
                <div class="pill">${statusLabel}</div>
              </div>
              <div class="note-top-right">
                <div class="progress-line">
                  <div class="progress-bar" aria-hidden="true">
                    <div class="progress-fill" style="--progress:${progressWidth}"></div>
                  </div>
                  <div class="progress-text">${formatRemaining(left)}</div>
                </div>
              </div>
            </div>

            <div class="note-text">${escapeHtml(note.text)}</div>

            <div class="meta">
              <div class="time">Created ${formatCreated(note.createdAt)}</div>
              <div class="note-actions">
                <button class="tiny flag-toggle" data-action="toggle-flag" data-id="${note.id}">${note.flagged ? 'Unflag' : 'Flag'}</button>
                <button class="tiny extend" data-action="extend" data-id="${note.id}">+1 day</button>
                <button class="tiny danger" data-action="delete" data-id="${note.id}">Delete</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function addNote(){
      const text = noteText.value.trim();
      const hours = getHours();
      if (!text) { alert('Write a note first.'); return; }
      if (!hours) { alert('Choose a valid expiration time.'); return; }

      const notes = removeExpired(loadNotes());
      notes.unshift(createNote(text, hours, importantBtn.classList.contains('active')));
      saveNotes(notes);
      noteText.value = '';
      customHours.value = '';
      importantBtn.classList.remove('active');
      importantBtn.setAttribute('aria-pressed', 'false');
      if (preset.value === 'custom') preset.value = '24';
      customHours.disabled = true;
      render();
    }

    preset.addEventListener('change', () => {
      customHours.disabled = preset.value !== 'custom';
      if (!customHours.disabled) customHours.focus();
    });

    addBtn.addEventListener('click', addNote);

    importantBtn.addEventListener('click', () => {
      const isActive = importantBtn.classList.toggle('active');
      importantBtn.setAttribute('aria-pressed', String(isActive));
    });

    themeToggle.addEventListener('click', () => {
      const next = document.body.classList.contains('dark') ? 'light' : 'dark';
      saveTheme(next);
      applyTheme(next);
    });

    noteList.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;

      const action = button.dataset.action;
      const id = button.dataset.id;
      let notes = removeExpired(loadNotes());

      if (action === 'delete') notes = notes.filter(note => note.id !== id);
      if (action === 'extend') notes = notes.map(note => note.id === id ? { ...note, expiresAt: note.expiresAt + 24 * 60 * 60 * 1000 } : note);
      if (action === 'toggle-flag') notes = notes.map(note => note.id === id ? { ...note, flagged: !note.flagged } : note);

      saveNotes(notes);
      render();
    });

    noteText.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') addNote();
    });

    applyTheme(loadTheme());
    render();
    setInterval(render, 30000);
  </script>
</body>
</html>
